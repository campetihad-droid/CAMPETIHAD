<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
<script>
const SERVER = 'https://campetihad-1.onrender.com';

const offerMap = {
  'BJNS8X7K2': 'bajaj',
  'PBVE9X3K1': 'policybazar',
  'QTNS5X2K9': 'Q'
};

const params = new URLSearchParams(window.location.search);
const cid = params.get('cid');
const ref = params.get('ref');

function loadOfferFile(offerFile, refCode) {
  // ✅ Ref code URL mein add karke redirect karo
  const url = '/offers/' + offerFile + '.html' + (refCode ? '?ref=' + encodeURIComponent(refCode) : '');
  window.location.replace(url);
}

if (cid && offerMap[cid]) {
  loadOfferFile(offerMap[cid], ref);
} else if (ref) {
  fetch(`${SERVER}/refer/amount?code=${encodeURIComponent(ref)}`)
    .then(r => r.json())
    .then(data => {
      if (data.success && data.offer_name) {
        const offerFile = data.offer_name.replace(/ /g, '').toLowerCase();
        loadOfferFile(offerFile, ref);
      } else {
        document.body.innerHTML = '<h2 style="text-align:center;margin-top:40px;font-family:sans-serif;">Offer Temporarily Paused</h2>';
      }
    })
    .catch(() => {
      document.body.innerHTML = '<h2 style="text-align:center;margin-top:40px;font-family:sans-serif;">Offer Temporarily Paused</h2>';
    });
} else {
  document.body.innerHTML = '<h2 style="text-align:center;margin-top:40px;font-family:sans-serif;">Offer Temporarily Paused</h2>';
}
</script>
</body>
</html>
