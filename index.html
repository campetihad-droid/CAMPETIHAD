<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { margin:0; padding:0; }
iframe { width:100%; height:100vh; border:none; display:block; }
</style>
</head>
<body>
<script>
const SERVER = 'https://campetihad-1.onrender.com';

const offerMap = {
  'PBNS8X7K2': 'np',
  'PBVE9X3K1': 'p',
  'QTNS5X2K9': 'Q'
};

const params = new URLSearchParams(window.location.search);
const cid = params.get('cid');
const ref = params.get('ref');

function loadOfferFile(offerFile, refCode) {
  const iframe = document.createElement('iframe');
  iframe.style.width = '100%';
  iframe.style.height = '100vh';
  iframe.style.border = 'none';
  // ✅ Ref code URL mein pass karo
  const src = '/offers/' + offerFile + '.html' + (refCode ? '?ref=' + encodeURIComponent(refCode) : '');
  iframe.src = src;
  document.body.appendChild(iframe);
}

if (cid && offerMap[cid]) {
  loadOfferFile(offerMap[cid], ref);
} else if (ref) {
  fetch(`${SERVER}/refer/amount?code=${encodeURIComponent(ref)}`)
    .then(r => r.json())
    .then(data => {
      if (data.success && data.offer_name) {
        const offerFile = data.offer_name.replace(/ /g, '').toLowerCase();
        loadOfferFile(offerFile, ref);
      } else {
        document.body.innerHTML = '<h2 style="text-align:center;margin-top:40px;font-family:sans-serif;">Offer Temporarily Paused</h2>';
      }
    })
    .catch(() => {
      document.body.innerHTML = '<h2 style="text-align:center;margin-top:40px;font-family:sans-serif;">Offer Temporarily Paused</h2>';
    });
} else {
  document.body.innerHTML = '<h2 style="text-align:center;margin-top:40px;font-family:sans-serif;">Offer Temporarily Paused</h2>';
}
</script>
</body>
</html>
