<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
<script>
const SERVER = 'https://campetihad-1.onrender.com';

const offerMap = {
  'PBNS8X7K2': 'P',
  'WAVE9X3K1': 'waves',
  'QTNS5X2K9': 'Q'
};

const params = new URLSearchParams(window.location.search);
const cid = params.get('cid');
const ref = params.get('ref');

function loadOfferFile(offerFile, refCode) {
  window.__REF_CODE__ = refCode || null;
  fetch('/offers/' + offerFile + '.html')
    .then(r => {
      if (!r.ok) throw new Error('Not found');
      return r.text();
    })
    .then(html => {
      // ✅ document.write ki jagah innerHTML use karo
      document.documentElement.innerHTML = html;
      // ✅ Scripts manually execute karo
      Array.from(document.querySelectorAll('script')).forEach(oldScript => {
        const newScript = document.createElement('script');
        Array.from(oldScript.attributes).forEach(attr => newScript.setAttribute(attr.name, attr.value));
        newScript.textContent = oldScript.textContent;
        oldScript.parentNode.replaceChild(newScript, oldScript);
      });
    })
    .catch(() => {
      document.body.innerHTML = '<h2 style="text-align:center;margin-top:40px;font-family:sans-serif;">Offer Temporarily Paused</h2>';
    });
}
</script>
</body>
</html>
